<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ErojuEntiii — What to eat today</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <div>
          <h1>ErojuEntiii</h1>
          <p class="subtitle">Decide what to eat today</p>
        </div>
        <button id="open-settings" type="button" class="settings-button" aria-haspopup="dialog">
          Settings
        </button>
      </header>

      <section class="card">
        <h2>Get a meal</h2>
        <div class="meal-types" role="group" aria-label="Meal type">
          <button type="button" class="meal-type active" data-meal-type="breakfast">Breakfast</button>
          <button type="button" class="meal-type" data-meal-type="lunch">Lunch</button>
          <button type="button" class="meal-type" data-meal-type="dinner">Dinner</button>
        </div>
        <label>
          Notes (optional)
          <input id="custom" type="text" placeholder="light meal, 20 minutes max" />
        </label>
        <button id="get-meal" type="button" class="primary">Suggest meal</button>
      </section>

      <section id="result" class="card hidden">
        <h2>Suggestion</h2>
        <div id="meal-output"></div>
        <div id="meal-actions" class="meal-actions">
          <button id="approve-meal" type="button" class="primary">Looks good — save it</button>
          <button id="retry-meal" type="button">Try another</button>
        </div>
      </section>

      <section class="card">
        <h2>Recent meals</h2>
        <ul id="history"></ul>
      </section>

      <p id="status" class="status" aria-live="polite"></p>
    </main>

    <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
      <div class="modal-backdrop" data-close-settings></div>
      <div class="modal-panel">
        <button type="button" class="modal-close" data-close-settings aria-label="Close">&times;</button>
        <h2 id="settings-modal-title">Settings</h2>
        <p class="modal-description">Pantry and preferences shape your meal suggestions.</p>

        <div class="modal-section">
          <h3>Your pantry</h3>
          <textarea id="pantry" rows="3" placeholder="rice, eggs, dal, tomatoes"></textarea>
        </div>

        <div class="modal-section">
          <h3>Preferences</h3>
          <label>
            Cuisine
            <input id="cuisine" type="text" placeholder="South Indian" />
          </label>
          <label>
            Region
            <input id="region" type="text" placeholder="Hyderabad" />
          </label>
        </div>

        <button id="save-settings" type="button" class="primary settings-save">Save settings</button>
      </div>
    </div>

    <div id="meal-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="meal-modal-title">
      <div class="modal-backdrop" data-close-meal></div>
      <div class="modal-panel">
        <button type="button" class="modal-close" data-close-meal aria-label="Close">&times;</button>
        <h2 id="meal-modal-title"></h2>
        <p id="meal-modal-description" class="modal-description"></p>
        <div id="meal-modal-body"></div>
      </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
